<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#2D2D2D">Tokenizer Comparison: Who Uses What?</text>

  <!-- Table Header -->
  <rect x="30" y="50" width="740" height="40" rx="0" fill="#D4704A"/>
  <text x="160" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="white">Tokenizer</text>
  <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="white">Used By</text>
  <text x="680" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="white">Vocab Size</text>

  <!-- Row 1: BPE -->
  <rect x="30" y="90" width="740" height="60" fill="#FFF9F6" stroke="#eee" stroke-width="1"/>
  <text x="160" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">BPE</text>
  <text x="160" y="136" text-anchor="middle" font-size="11" fill="#666">(Byte Pair Encoding)</text>
  <text x="400" y="118" text-anchor="middle" font-size="13" fill="#2D2D2D">GPT-2, GPT-3, GPT-4, GPT-4o</text>
  <text x="400" y="136" text-anchor="middle" font-size="13" fill="#2D2D2D">LLaMA, Mistral, Claude</text>
  <text x="680" y="125" text-anchor="middle" font-size="13" fill="#2D2D2D">50K ~ 200K</text>

  <!-- Row 2: WordPiece -->
  <rect x="30" y="150" width="740" height="60" fill="#F5F0EB" stroke="#eee" stroke-width="1"/>
  <text x="160" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">WordPiece</text>
  <text x="160" y="196" text-anchor="middle" font-size="11" fill="#666">(Google's variant)</text>
  <text x="400" y="178" text-anchor="middle" font-size="13" fill="#2D2D2D">BERT, DistilBERT, Electra</text>
  <text x="400" y="196" text-anchor="middle" font-size="13" fill="#2D2D2D">MobileBERT, MPNET</text>
  <text x="680" y="185" text-anchor="middle" font-size="13" fill="#2D2D2D">~30K</text>

  <!-- Row 3: SentencePiece -->
  <rect x="30" y="210" width="740" height="60" fill="#FFF9F6" stroke="#eee" stroke-width="1"/>
  <text x="160" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">SentencePiece</text>
  <text x="160" y="256" text-anchor="middle" font-size="11" fill="#666">(Unigram/BPE)</text>
  <text x="400" y="238" text-anchor="middle" font-size="13" fill="#2D2D2D">T5, ALBERT, XLNet</text>
  <text x="400" y="256" text-anchor="middle" font-size="13" fill="#2D2D2D">Gemma, mBART (multilingual)</text>
  <text x="680" y="245" text-anchor="middle" font-size="13" fill="#2D2D2D">32K ~ 256K</text>

  <!-- Row 4: Tiktoken -->
  <rect x="30" y="270" width="740" height="60" fill="#F5F0EB" stroke="#eee" stroke-width="1"/>
  <text x="160" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">Tiktoken</text>
  <text x="160" y="316" text-anchor="middle" font-size="11" fill="#666">(OpenAI's implementation)</text>
  <text x="400" y="298" text-anchor="middle" font-size="13" fill="#2D2D2D">GPT-4 (cl100k_base: 100K tokens)</text>
  <text x="400" y="316" text-anchor="middle" font-size="13" fill="#2D2D2D">GPT-4o (o200k_base: 200K tokens)</text>
  <text x="680" y="305" text-anchor="middle" font-size="13" fill="#2D2D2D">100K ~ 200K</text>

  <!-- Footer note -->
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#888">Note: Larger vocab = more words stored as single tokens = fewer tokens per sentence = faster inference</text>
  <text x="400" y="380" text-anchor="middle" font-size="12" fill="#888">But also = larger embedding matrix = more memory usage</text>
</svg>