<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#2D2D2D">How Llama "solved" 3^12345 mod 100</text>

  <!-- What it showed -->
  <rect x="30" y="48" width="355" height="295" rx="10" fill="#FFF3F0" stroke="#D4704A" stroke-width="1.5"/>
  <text x="207" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#D4704A">What Llama showed you</text>

  <text x="50" y="100" font-size="12" fill="#555">Step 1: Compute first 10 powers mod 100</text>
  <rect x="50" y="108" width="310" height="22" rx="4" fill="#1E1E1E"/>
  <text x="58" y="123" font-size="10" font-family="JetBrains Mono, monospace" fill="#D4D4D4">[3, 9, 27, 81, 43, 29, 87, 61, 83, 49]</text>

  <text x="50" y="152" font-size="12" fill="#555">Step 2: "Pattern repeats every 20 powers"</text>
  <rect x="50" y="160" width="310" height="22" rx="4" fill="#1E1E1E"/>
  <text x="58" y="175" font-size="10" font-family="JetBrains Mono, monospace" fill="#D4D4D4">simplified_exponent = 12345 % 20  # = 5</text>

  <text x="50" y="205" font-size="12" fill="#555">Step 3: Calculate final answer</text>
  <rect x="50" y="213" width="310" height="22" rx="4" fill="#1E1E1E"/>
  <text x="58" y="228" font-size="10" font-family="JetBrains Mono, monospace" fill="#D4D4D4">pow(3, 5, 100)  # Output: 43</text>

  <rect x="50" y="250" width="310" height="35" rx="6" fill="#D4F5D4" stroke="#4A9D4A" stroke-width="1.5"/>
  <text x="205" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#4A9D4A">Answer: 43 (Correct!)</text>

  <text x="207" y="318" text-anchor="middle" font-size="11" fill="#888">Looks rigorous, step-by-step, with code.</text>
  <text x="207" y="333" text-anchor="middle" font-size="11" fill="#888">But is it real reasoning?</text>

  <!-- What actually happened -->
  <rect x="415" y="48" width="355" height="295" rx="10" fill="#F0F4FF" stroke="#4A6DD4" stroke-width="1.5"/>
  <text x="592" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#4A6DD4">What actually happened inside</text>

  <rect x="435" y="90" width="315" height="44" rx="6" fill="#E8E4F8" stroke="#6B4AD4" stroke-width="1"/>
  <text x="592" y="110" text-anchor="middle" font-size="11" fill="#555">Recognized pattern: modular exponentiation</text>
  <text x="592" y="125" text-anchor="middle" font-size="11" fill="#555">Recalled from training data: period = 20</text>

  <path d="M592 134 L592 152" stroke="#6B4AD4" stroke-width="1.5" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6B4AD4"/></marker></defs>

  <rect x="435" y="155" width="315" height="32" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="592" y="176" text-anchor="middle" font-size="11" fill="#555">Generated code + fake "Output" as text</text>

  <path d="M592 187 L592 205" stroke="#6B4AD4" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="435" y="208" width="315" height="32" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="592" y="229" text-anchor="middle" font-size="11" fill="#555">10 items shown, but claimed period = 20 (gap!)</text>

  <path d="M592 240 L592 258" stroke="#6B4AD4" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="435" y="261" width="315" height="32" rx="6" fill="#E8F4E8" stroke="#4A9D4A" stroke-width="1"/>
  <text x="592" y="282" text-anchor="middle" font-size="11" fill="#555">Already knew answer = 43, built story around it</text>

  <text x="592" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#4A6DD4">Right answer. Wrong reasoning.</text>
  <text x="592" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#4A6DD4">Post-hoc rationalization.</text>
</svg>