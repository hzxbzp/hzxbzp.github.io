<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#2D2D2D">How "httpstatus" gets tokenized (GPT-style BPE)</text>

  <!-- Original word -->
  <rect x="50" y="50" width="700" height="50" rx="8" fill="#F5F0EB" stroke="#D4704A" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-size="22" font-weight="500" fill="#2D2D2D" font-family="JetBrains Mono, monospace">"httpstatus"</text>

  <!-- Arrow -->
  <path d="M400 100 L400 130" stroke="#D4704A" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4704A"/>
    </marker>
  </defs>

  <!-- Tokenizer label -->
  <rect x="310" y="133" width="180" height="30" rx="15" fill="#D4704A"/>
  <text x="400" y="153" text-anchor="middle" font-size="13" fill="white" font-weight="500">BPE Tokenizer</text>

  <!-- Arrow -->
  <path d="M400 163 L400 190" stroke="#D4704A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tokens -->
  <rect x="80" y="195" width="120" height="50" rx="8" fill="#E8F4E8" stroke="#4A9D4A" stroke-width="2"/>
  <text x="140" y="225" text-anchor="middle" font-size="18" font-family="JetBrains Mono, monospace" fill="#2D2D2D">http</text>
  <text x="140" y="238" text-anchor="middle" font-size="10" fill="#666">Token #1</text>

  <rect x="220" y="195" width="120" height="50" rx="8" fill="#E8F4E8" stroke="#4A9D4A" stroke-width="2"/>
  <text x="280" y="225" text-anchor="middle" font-size="18" font-family="JetBrains Mono, monospace" fill="#2D2D2D">status</text>
  <text x="280" y="238" text-anchor="middle" font-size="10" fill="#666">Token #2</text>

  <!-- Arrow to IDs -->
  <path d="M400 245 L400 270" stroke="#D4704A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Token IDs -->
  <rect x="80" y="275" width="120" height="35" rx="6" fill="#E8E4F8" stroke="#6B4AD4" stroke-width="1.5"/>
  <text x="140" y="298" text-anchor="middle" font-size="15" font-family="JetBrains Mono, monospace" fill="#6B4AD4">ID: 2511</text>

  <rect x="220" y="275" width="120" height="35" rx="6" fill="#E8E4F8" stroke="#6B4AD4" stroke-width="1.5"/>
  <text x="280" y="298" text-anchor="middle" font-size="15" font-family="JetBrains Mono, monospace" fill="#6B4AD4">ID: 8890</text>

  <!-- The problem illustration -->
  <rect x="430" y="195" width="330" height="115" rx="8" fill="#FFF3F0" stroke="#D4704A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="595" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#D4704A">The Problem:</text>
  <text x="595" y="240" text-anchor="middle" font-size="12" fill="#555">The LLM sees [http] [status] as 2 chunks,</text>
  <text x="595" y="258" text-anchor="middle" font-size="12" fill="#555">NOT individual letters h-t-t-p-s-t-a-t-u-s.</text>
  <text x="595" y="280" text-anchor="middle" font-size="12" fill="#555">So when asked to reverse letters,</text>
  <text x="595" y="298" text-anchor="middle" font-size="12" fill="#555">it doesn't know where each letter is!</text>
</svg>