# Site Settings
title: Zhipeng Bao
description: "AI · Robotics · Autonomous Driving — Thoughts on technology and life"
url: "https://hzxbzp.github.io"
baseurl: ""
author: Zhipeng Bao

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Default language
lang: en

# Collections
collections:
  portfolio:
    output: true
    permalink: /portfolio/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "portfolio"
    values:
      layout: "project"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
